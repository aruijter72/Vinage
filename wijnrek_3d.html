<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Vinage – 3D Wijnrek</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#f5f0eb; overflow:hidden;
           font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
    canvas { display:block; cursor:grab; }
    canvas:active { cursor:grabbing; }
    #loading {
      position:fixed; inset:0; background:#f5f0eb; z-index:99;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
    }
    #loading p { font-size:12px; color:#8a6040; letter-spacing:3px; text-transform:uppercase; }
    #load-err  { color:#c04020; font-size:11px; max-width:520px; text-align:center; }
    #title {
      position:fixed; top:18px; left:0; right:0; text-align:center;
      color:#5c2a10; font-size:13px; letter-spacing:5px;
      text-transform:uppercase; font-weight:400; pointer-events:none;
    }
    #ui {
      position:fixed; bottom:20px; left:0; right:0; display:none;
      justify-content:center; align-items:center; gap:14px;
    }
    button {
      padding:9px 26px; background:#5c1a10; color:#f5e8de;
      border:none; border-radius:22px; cursor:pointer;
      font-size:12px; letter-spacing:1.5px; text-transform:uppercase;
      box-shadow:0 3px 14px rgba(0,0,0,0.18);
    }
    button:hover { background:#7c2518; }
    #hint {
      padding:7px 16px; background:rgba(0,0,0,0.06);
      border:1px solid rgba(0,0,0,0.10); border-radius:14px;
      font-size:11px; color:#7a5030; letter-spacing:1px;
    }
  </style>
</head>
<body>
<div id="loading"><p>Laden…</p><span id="load-err"></span></div>
<div id="title">Vinage &mdash; Wijnkelder</div>
<div id="ui">
  <button id="save-btn">PNG Opslaan</button>
  <div id="hint">Sleep · Scroll om te zoomen</div>
</div>

<script src="./three.min.js"></script>
<script>
window.onerror=function(msg,_,line){document.getElementById('load-err').textContent='Fout r'+line+': '+msg;};
if(typeof THREE==='undefined'){
  document.getElementById('load-err').textContent='three.min.js niet gevonden.';
}else{build();}

function build(){try{

// ================================================================
// VINAGE – 3D Wijnrek  |  Three.js r128
// Ronde LatheGeometry-flessen liggend in het rek
// NX=5 kolommen  NY=2 diepte  NZ=5 rijen hoog
// ================================================================

const renderer=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.physicallyCorrectLights=true;
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.10;
document.body.appendChild(renderer.domElement);

// ── Studio-omgeving (glastransmissie + reflecties) ───────────────
function buildEnvTex(){
  const W=512,H=256,d=new Uint8Array(W*H*4);
  for(let y=0;y<H;y++) for(let x=0;x<W;x++){
    const az=(x/W)*Math.PI*2, el=1-(y/H);
    let r=245,g=242,b=238;
    const key=Math.pow(Math.max(0,Math.cos(az-0.4)),3);
    r+=key*12;g+=key*7;b-=key*5;
    const fill=Math.pow(Math.max(0,Math.cos(az-Math.PI*0.8)),3);
    b+=fill*10;
    const ceil=Math.pow(Math.max(0,el-0.55)/0.45,2);
    r+=ceil*12;g+=ceil*12;b+=ceil*12;
    const fl=Math.pow(Math.max(0,0.25-el)/0.25,2);
    r-=fl*22;g-=fl*22;b-=fl*22;
    const i=(y*W+x)*4;
    d[i]=Math.min(255,Math.max(0,r));d[i+1]=Math.min(255,Math.max(0,g));
    d[i+2]=Math.min(255,Math.max(0,b));d[i+3]=255;
  }
  const t=new THREE.DataTexture(d,W,H,THREE.RGBAFormat);
  t.mapping=THREE.EquirectangularReflectionMapping;
  t.encoding=THREE.sRGBEncoding; t.needsUpdate=true; return t;
}
const envRaw=buildEnvTex();
const pmrem=new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();
const envTex=pmrem.fromEquirectangular(envRaw).texture;
pmrem.dispose(); envRaw.dispose();

const scene=new THREE.Scene();
scene.background=new THREE.Color(0xf5f0eb);
scene.environment=envTex;

// ── Verlichting ───────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xfff5ee,1.0));
const keyL=new THREE.DirectionalLight(0xfff8f0,2.8);
keyL.position.set(2,4,3); keyL.castShadow=true;
keyL.shadow.mapSize.set(2048,2048);
keyL.shadow.camera.left=-1.2; keyL.shadow.camera.right=1.2;
keyL.shadow.camera.top=1.2;  keyL.shadow.camera.bottom=-1.2;
keyL.shadow.camera.near=0.1; keyL.shadow.camera.far=12;
keyL.shadow.bias=-0.0006; scene.add(keyL);
const fillL=new THREE.DirectionalLight(0xddeeff,0.7);
fillL.position.set(-2,1.5,1); scene.add(fillL);
const topL=new THREE.DirectionalLight(0xffffff,0.5);
topL.position.set(0,5,0); scene.add(topL);

// ================================================================
// REKPARAMETERS
// NX=5 kolommen  NY=2 diepte (structureel, 1 fles over beide vakjes)
// NZ=5 rijen hoog  CELL=0.12 m
// ================================================================
const NX=5, NY=2, NZ=5, CELL=0.12;
const ROD_R=0.0052, NODE_R=0.0095;

function bPt(ix,iy,iz){
  return new THREE.Vector3((ix-NX/2)*CELL,(iz-NZ/2)*CELL,-((iy-NY/2)*CELL));
}

const rackMat=new THREE.MeshStandardMaterial({
  color:0x1c1408, metalness:0.90, roughness:0.25, envMapIntensity:0.8
});

function buildRack(){
  const grp=new THREE.Group();
  const sph=new THREE.SphereGeometry(NODE_R,14,10);
  function addRod(p1,p2){
    const dir=new THREE.Vector3().subVectors(p2,p1);
    const len=dir.length(); if(len<1e-6)return;
    const mid=new THREE.Vector3().addVectors(p1,p2).multiplyScalar(.5);
    const m=new THREE.Mesh(new THREE.CylinderGeometry(ROD_R,ROD_R,len,10),rackMat);
    m.position.copy(mid);
    m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir.normalize());
    m.castShadow=true; m.receiveShadow=true; grp.add(m);
  }
  for(let ix=0;ix<=NX;ix++) for(let iy=0;iy<=NY;iy++) for(let iz=0;iz<=NZ;iz++){
    const p=bPt(ix,iy,iz);
    const s=new THREE.Mesh(sph,rackMat); s.position.copy(p); s.castShadow=true; grp.add(s);
    if(ix<NX)addRod(p,bPt(ix+1,iy,iz));
    if(iy<NY)addRod(p,bPt(ix,iy+1,iz));
    if(iz<NZ)addRod(p,bPt(ix,iy,iz+1));
  }
  return grp;
}

// ================================================================
// FLESVORMEN via LatheGeometry (gecentreerd op y=0)
// ================================================================
function buildProfile(shape){
  let h=0.355,bR=0.036,nR=0.0140,nH=0.090,sH=0.070;
  if(shape==='champagne'){h=0.368;bR=0.036;nR=0.0115;nH=0.115;sH=0.082;}
  if(shape==='fortified'){h=0.328;bR=0.037;nR=0.0155;nH=0.065;sH=0.048;}
  const off=-h/2,sh=h-nH-sH;
  const pts=[
    [0,0],[bR*.84,0],[bR,.013],[bR*1.016,.028],[bR,sh*.90],[bR,sh],
    [nR*1.35,sh+sH*.60],[nR*1.08,h-nH],[nR,h-nH*.42],
    [nR*1.06,h-.020],[nR*1.18,h-.008],[0,h]
  ].map(([x,y])=>new THREE.Vector2(x,y+off));
  const geo=new THREE.LatheGeometry(pts,88);
  geo.computeVertexNormals();
  return{geo,h,bR,nR,nH,sH};
}
const GEO={
  wine:      buildProfile('wine'),
  champagne: buildProfile('champagne'),
  fortified: buildProfile('fortified'),
};

// ================================================================
// WIJNTYPEN – kleuren gematcht aan echte flesafbeeldingen
// ================================================================
const WINE={
  red:{
    glass:'#1a0505',liquid:'#580008',
    cap:'#9c0e0e',capM:0.20,capH:0.028,
    shape:'wine',foil:null,
    transmission:0.80,ior:1.52,thickness:2.2
  },
  white:{
    glass:'#b0d850',liquid:'#c8a828',
    cap:'#dcdcc8',capM:0.15,capH:0.026,
    shape:'wine',foil:null,
    transmission:0.92,ior:1.45,thickness:0.7
  },
  rose:{
    glass:'#f0a8b0',liquid:'#d02848',
    cap:'#eeaabb',capM:0.12,capH:0.026,
    shape:'wine',foil:null,
    transmission:0.88,ior:1.46,thickness:0.8
  },
  sparkling:{
    glass:'#0a1e08',liquid:'#a09018',
    cap:'#c8a018',capM:0.70,capH:0.040,
    shape:'champagne',foil:'#d4b028',
    transmission:0.80,ior:1.52,thickness:2.0
  },
  fortified:{
    glass:'#c87020',liquid:'#401804',
    cap:'#a08020',capM:0.60,capH:0.025,
    shape:'fortified',foil:null,
    transmission:0.72,ior:1.50,thickness:1.4
  },
};

const SEQ=[
  ...Array(7).fill('red'),  ...Array(6).fill('white'),
  ...Array(4).fill('rose'), ...Array(3).fill('sparkling'),
  ...Array(2).fill('fortified')
];
const EMPTY=new Set(['0,4','4,3','2,2']);

function makeGlass(w){
  return new THREE.MeshPhysicalMaterial({
    color:new THREE.Color(w.glass),
    metalness:0,roughness:0.03,
    transmission:w.transmission,ior:w.ior,thickness:w.thickness,
    envMapIntensity:2.0,transparent:true,depthWrite:false,
  });
}
function makeSolid(hex,metal,rough){
  return new THREE.MeshStandardMaterial({
    color:new THREE.Color(hex),metalness:metal,roughness:rough
  });
}
const LABEL_MAT=new THREE.MeshStandardMaterial({color:0xf5f0e8,roughness:0.65,metalness:0});

// ── Fles bouwen ───────────────────────────────────────────────────
function makeBottle(wtype){
  const w=WINE[wtype],bg=GEO[w.shape];
  const{h,bR,nR,nH,sH}=bg;
  const grp=new THREE.Group();

  // 1) Wijnvulling (eerst – achter het glas)
  const bodyH=h-nH-sH;
  const liqH=bodyH+sH*0.82;
  const liq=new THREE.Mesh(
    new THREE.CylinderGeometry(bR*0.82,bR*0.50,liqH,40),
    new THREE.MeshStandardMaterial({
      color:new THREE.Color(w.liquid),roughness:0.04,metalness:0,
      transparent:true,opacity:0.97
    })
  );
  liq.position.y=-h/2+liqH/2+0.006;
  grp.add(liq);

  // 2) Glaslichaam
  const body=new THREE.Mesh(bg.geo,makeGlass(w));
  body.castShadow=true; grp.add(body);

  // 3) Capsule / dop
  const cpR=nR*1.14;
  const cap=new THREE.Mesh(
    new THREE.CylinderGeometry(cpR,cpR,w.capH,36),
    makeSolid(w.cap,w.capM,0.28)
  );
  cap.position.y=h/2-w.capH*0.5; cap.castShadow=true; grp.add(cap);

  // 4) Foliehuls mousserende wijn
  if(w.foil){
    const fH=w.capH*1.55,fR=cpR*1.30;
    const foilM=makeSolid(w.foil,0.88,0.14);
    const foil=new THREE.Mesh(new THREE.CylinderGeometry(fR*0.96,fR,fH,36),foilM);
    foil.position.y=h/2-fH*0.52; foil.castShadow=true; grp.add(foil);
  }

  // 5) Etiket
  const lH=w.shape==='champagne'?0.068:0.072;
  const lblY=w.shape==='champagne'?-h*0.07:-h*0.03;
  const lbl=new THREE.Mesh(
    new THREE.CylinderGeometry(bR*1.009,bR*1.009,lH,64,1,true),
    LABEL_MAT
  );
  lbl.position.y=lblY; grp.add(lbl);

  return grp;
}

// ================================================================
// FLESSEN PLAATSEN
// 1 fles per (ix, iz) – Rx(-π/2) legt fles horizontaal (lange as → Z)
// ================================================================
function placeBottles(){
  const grp=new THREE.Group();
  let ti=0;
  for(let iz=0;iz<NZ;iz++){
    for(let ix=0;ix<NX;ix++){
      if(EMPTY.has(ix+','+iz))continue;
      const wtype=SEQ[ti++%SEQ.length];
      const bottle=makeBottle(wtype);
      bottle.position.set(
        ((ix+0.5)-NX/2)*CELL,
        ((iz+0.5)-NZ/2)*CELL,
        0
      );
      bottle.rotation.set(-Math.PI/2,0,0);
      grp.add(bottle);
    }
  }
  return grp;
}

// ── Grondvlak ────────────────────────────────────────────────────
const gnd=new THREE.Mesh(
  new THREE.PlaneGeometry(8,8),
  new THREE.MeshStandardMaterial({color:0xede8e2,roughness:0.95,metalness:0})
);
gnd.rotation.x=-Math.PI/2;
gnd.position.y=(-NZ/2)*CELL-0.012;
gnd.receiveShadow=true;
scene.add(gnd);

// ── Scene samenstellen ────────────────────────────────────────────
scene.add(buildRack());
scene.add(placeBottles());

document.getElementById('loading').style.display='none';
document.getElementById('ui').style.display='flex';

// ── Camera ────────────────────────────────────────────────────────
const CAM_TARGET=new THREE.Vector3(0,0,0);
const camera=new THREE.PerspectiveCamera(36,window.innerWidth/window.innerHeight,0.001,30);
camera.position.set(1.2,1.0,1.7);
camera.lookAt(CAM_TARGET);

let dist=camera.position.distanceTo(CAM_TARGET);
let theta=Math.atan2(camera.position.x-CAM_TARGET.x,camera.position.z-CAM_TARGET.z);
let phi=Math.asin(Math.max(-.99,Math.min(.99,(camera.position.y-CAM_TARGET.y)/dist)));

function applyCam(){
  camera.position.set(
    CAM_TARGET.x+dist*Math.cos(phi)*Math.sin(theta),
    CAM_TARGET.y+dist*Math.sin(phi),
    CAM_TARGET.z+dist*Math.cos(phi)*Math.cos(theta)
  ); camera.lookAt(CAM_TARGET);
}

let drag=false,lx=0,ly=0;
const cv=renderer.domElement;
cv.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;});
cv.addEventListener('mouseup',()=>drag=false);
cv.addEventListener('mouseleave',()=>drag=false);
cv.addEventListener('mousemove',e=>{
  if(!drag)return;
  theta-=(e.clientX-lx)*.006;
  phi=Math.max(.08,Math.min(Math.PI/2-.04,phi-(e.clientY-ly)*.005));
  lx=e.clientX;ly=e.clientY; applyCam();
});
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  dist=Math.max(.4,Math.min(5,dist+e.deltaY*.003));
  applyCam();
},{passive:false});
cv.addEventListener('touchstart',e=>{drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;},{passive:true});
cv.addEventListener('touchend',()=>drag=false);
cv.addEventListener('touchmove',e=>{
  if(!drag)return;
  theta-=(e.touches[0].clientX-lx)*.006;
  phi=Math.max(.08,Math.min(Math.PI/2-.04,phi-(e.touches[0].clientY-ly)*.005));
  lx=e.touches[0].clientX;ly=e.touches[0].clientY; applyCam();
},{passive:true});

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

(function loop(){requestAnimationFrame(loop);renderer.render(scene,camera);})();

document.getElementById('save-btn').addEventListener('click',()=>{
  renderer.render(scene,camera);
  Object.assign(document.createElement('a'),
    {download:'vinage_wijnrek.png',href:renderer.domElement.toDataURL('image/png')}
  ).click();
});

}catch(e){document.getElementById('load-err').textContent='Opbouwfout: '+e.message;console.error(e);}}
</script>
</body>
</html>
