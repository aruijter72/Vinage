<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Vinage – 3D Wijnrek</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #d4d4d4; overflow: hidden;
           font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    canvas { display: block; cursor: grab; }
    canvas:active { cursor: grabbing; }
    #loading {
      position: fixed; inset: 0; background: #f5f5f5; z-index: 99;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
    }
    #loading p   { font-size: 12px; color: #888; letter-spacing: 2px; }
    #load-err    { color: #c03030; font-size: 11px; max-width: 520px; text-align: center; }
    #title {
      position: fixed; top: 16px; left: 0; right: 0; text-align: center;
      color: #3a1a10; font-size: 13px; letter-spacing: 5px;
      text-transform: uppercase; font-weight: 400; pointer-events: none;
    }
    #ui {
      position: fixed; bottom: 18px; left: 0; right: 0; display: none;
      justify-content: center; align-items: center; gap: 14px;
    }
    button {
      padding: 9px 24px; background: #5c1a10; color: #f5e8de;
      border: none; border-radius: 22px; cursor: pointer;
      font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
      box-shadow: 0 3px 12px rgba(0,0,0,0.22);
    }
    button:hover { background: #7c2518; }
    #hint {
      padding: 7px 14px; background: rgba(255,255,255,0.72);
      border: 1px solid rgba(0,0,0,0.07); border-radius: 14px;
      backdrop-filter: blur(6px); font-size: 11px; color: #444;
    }
  </style>
</head>
<body>

<div id="loading">
  <p>LADEN…</p>
  <span id="load-err"></span>
</div>
<div id="title">Vinage &mdash; Wijnkelder</div>
<div id="ui">
  <button id="save-btn">PNG Opslaan</button>
  <div id="hint">Sleep · Scroll om te zoomen</div>
</div>

<!-- Three.js r128 – lokaal opgeslagen, geen internet nodig -->
<script src="./three.min.js"></script>

<script>
window.onerror = function(msg, _s, line) {
  document.getElementById('load-err').textContent = 'Fout (r' + line + '): ' + msg;
};

if (typeof THREE === 'undefined') {
  document.getElementById('load-err').textContent =
    'Three.js kon niet laden – zorg dat three.min.js in dezelfde map staat als dit bestand.';
} else {
  build();
}

function build() {
try {

// ================================================================
// VINAGE – 3D Wijnrek  |  Three.js r128
//
// Flesvorm  : LatheGeometry (gedraaid 2D-profiel)
// Glas      : MeshPhysicalMaterial + transmission + eigen env-map
// Coördinaten: Blender(x,y,z) → Three.js(x, z, -y)
// ================================================================

// ── Renderer ────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled   = true;
renderer.shadowMap.type      = THREE.PCFSoftShadowMap;
renderer.physicallyCorrectLights = true;
renderer.outputEncoding      = THREE.sRGBEncoding;
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
document.body.appendChild(renderer.domElement);

// ── Environment map voor glasreflecties (r128-compatibel) ────────
// Maak een equirectangulaire DataTexture die een studio simuleert:
// warm rechts (key), koel links (fill), helder plafond, neutraal rest.
function buildEnvTexture() {
  const W = 512, H = 256;
  const data = new Uint8Array(W * H * 4);
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const az  = (x / W) * Math.PI * 2;   // azimuth 0..2π
      const el  = 1 - (y / H);             // elevatie 0=onder 1=boven

      // basis: helder studio-wit
      let r = 235, g = 235, b = 235;

      // warm key-licht (rechtsvoor, az ≈ 0.4)
      const key  = Math.pow(Math.max(0, Math.cos(az - 0.4)), 3);
      r += key * 20; g += key * 10; b -= key * 8;

      // koel fill (linksvoor, az ≈ π*0.8)
      const fill = Math.pow(Math.max(0, Math.cos(az - Math.PI * 0.8)), 3);
      r -= fill * 5; g -= fill * 3; b += fill * 15;

      // helder plafond
      const ceil = Math.pow(Math.max(0, el - 0.55) / 0.45, 2);
      r += ceil * 20; g += ceil * 20; b += ceil * 20;

      // donkerdere vloer
      const floor = Math.pow(Math.max(0, 0.25 - el) / 0.25, 2);
      r -= floor * 40; g -= floor * 40; b -= floor * 40;

      const i = (y * W + x) * 4;
      data[i]   = Math.min(255, Math.max(0, r));
      data[i+1] = Math.min(255, Math.max(0, g));
      data[i+2] = Math.min(255, Math.max(0, b));
      data[i+3] = 255;
    }
  }
  const tex = new THREE.DataTexture(data, W, H, THREE.RGBAFormat);
  tex.mapping  = THREE.EquirectangularReflectionMapping;
  tex.encoding = THREE.sRGBEncoding;
  tex.needsUpdate = true;
  return tex;
}

const envRaw = buildEnvTexture();
const pmrem  = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();
const envTex = pmrem.fromEquirectangular(envRaw).texture;
pmrem.dispose();
envRaw.dispose();

// ── Scene ────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background  = new THREE.Color(0xf5f5f5);
scene.environment = envTex;

// ── Camera ────────────────────────────────────────────────────────
// Blender pos(1.6, -2.2, 1.25) → Three.js(1.6, 1.25, 2.2)
const CAM_TARGET = new THREE.Vector3(0, 0.25, 0);
const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.001, 50);
camera.position.set(1.6, 1.25, 2.2);
camera.lookAt(CAM_TARGET);

// ── Verlichting ───────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.6));

const keyL = new THREE.DirectionalLight(0xfffaf4, 3.0);
keyL.position.set(1.2, 1.8, 2.0);
keyL.castShadow = true;
keyL.shadow.mapSize.set(2048, 2048);
keyL.shadow.camera.left = -1.5; keyL.shadow.camera.right =  1.5;
keyL.shadow.camera.top  =  1.5; keyL.shadow.camera.bottom = -1.5;
keyL.shadow.camera.near =  0.1; keyL.shadow.camera.far   = 10;
keyL.shadow.bias = -0.0008;
scene.add(keyL);

const fillL = new THREE.DirectionalLight(0xddeeff, 1.0);
fillL.position.set(-1.6, 1.2, 1.2);
scene.add(fillL);

const rimL = new THREE.DirectionalLight(0xffffff, 1.3);
rimL.position.set(0, 1.6, -2.2);
scene.add(rimL);

// ================================================================
// REKPARAMETERS – identiek aan Blender-script
// ================================================================
const NX = 5, NY = 3, NZ = 2, CELL = 0.12;
const ROD_R = 0.006, NODE_R = 0.0108;

function bPt(ix, iy, iz) {
  return new THREE.Vector3(
    (ix - NX/2) * CELL,  (iz - NZ/2) * CELL,  -((iy - NY/2) * CELL));
}
function slotPt(ix, iy, iz) {
  return new THREE.Vector3(
    ((ix+0.5) - NX/2) * CELL,  ((iz+0.5) - NZ/2) * CELL,
    -(((iy+0.5) - NY/2) * CELL));
}

// ── Rekmateriaal ─────────────────────────────────────────────────
const rackMat = new THREE.MeshStandardMaterial({
  color: 0x090909, metalness: 1.0, roughness: 0.18, envMapIntensity: 0.9,
});

// ================================================================
// REKSTRUCTUUR (5×3×2 = 30 slots)
// ================================================================
function buildRack() {
  const grp    = new THREE.Group();
  const sphGeo = new THREE.SphereGeometry(NODE_R, 16, 12);

  function addRod(p1, p2) {
    const dir = new THREE.Vector3().subVectors(p2, p1);
    const len = dir.length();
    if (len < 1e-6) return;
    const mid  = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
    const mesh = new THREE.Mesh(
      new THREE.CylinderGeometry(ROD_R, ROD_R, len, 10), rackMat);
    mesh.position.copy(mid);
    mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
    mesh.castShadow = true;
    grp.add(mesh);
  }

  for (let ix = 0; ix <= NX; ix++)
    for (let iy = 0; iy <= NY; iy++)
      for (let iz = 0; iz <= NZ; iz++) {
        const p = bPt(ix, iy, iz);
        const s = new THREE.Mesh(sphGeo, rackMat);
        s.position.copy(p); s.castShadow = true; grp.add(s);
        if (ix < NX) addRod(p, bPt(ix+1,iy,  iz  ));
        if (iy < NY) addRod(p, bPt(ix,  iy+1, iz  ));
        if (iz < NZ) addRod(p, bPt(ix,  iy,   iz+1));
      }
  return grp;
}

// ================================================================
// FLESVORMEN via LatheGeometry
// Profiel langs +Y. Gecentreerd op y=0 (off = -h/2).
// ================================================================
function buildProfile(shape) {
  let h=0.355, bR=0.036, nR=0.0140, nH=0.090, sH=0.070;
  if (shape === 'champagne') { h=0.368; nR=0.0115; nH=0.115; sH=0.082; }
  if (shape === 'fortified') { h=0.328; nR=0.0155; nH=0.065; sH=0.048; }
  const off = -h/2, sh = h - nH - sH;
  const pts = [
    [0,          0          ],
    [bR*0.84,    0          ],
    [bR,         0.013      ],
    [bR*1.016,   0.028      ],
    [bR,         sh*0.90    ],
    [bR,         sh         ],
    [nR*1.35,    sh+sH*0.60 ],
    [nR*1.08,    h-nH       ],
    [nR,         h-nH*0.42  ],
    [nR*1.06,    h-0.020    ],
    [nR*1.18,    h-0.008    ],
    [0,          h          ],
  ].map(([x,y]) => new THREE.Vector2(x, y+off));

  const geo = new THREE.LatheGeometry(pts, 88);
  geo.computeVertexNormals();
  return { geo, h, bR, nR };
}

const GEO = {
  wine:      buildProfile('wine'),
  champagne: buildProfile('champagne'),
  fortified: buildProfile('fortified'),
};

// ── Materiaalfuncties ─────────────────────────────────────────────
function makeGlass(color) {
  return new THREE.MeshPhysicalMaterial({
    color:           new THREE.Color(color),
    roughness:       0.02, metalness: 0,
    transmission:    0.92, ior: 1.45, thickness: 0.80,
    envMapIntensity: 1.4,
    transparent:     true, depthWrite: false,
  });
}
function makeCap(color, metalness) {
  return new THREE.MeshStandardMaterial({
    color: new THREE.Color(color), metalness, roughness: 0.28,
  });
}
const LABEL_MAT = new THREE.MeshStandardMaterial({
  color: 0xf2ede5, roughness: 0.72, metalness: 0,
});

// ================================================================
// WIJNTYPEN – identiek aan Blender
// ================================================================
const WINE = {
  red:       { glass:'#0d0404', cap:'#b01010', capM:0.12, shape:'wine'      },
  white:     { glass:'#8ec05a', cap:'#e5e5dc', capM:0.08, shape:'wine'      },
  rose:      { glass:'#c02848', cap:'#f090a8', capM:0.10, shape:'wine'      },
  sparkling: { glass:'#0b2410', cap:'#c8a420', capM:0.72,
               foil: '#d4b02a',                           shape:'champagne' },
  fortified: { glass:'#561e06', cap:'#3a1404', capM:0.12, shape:'fortified' },
};
const SEQ = [
  ...Array(7).fill('red'),   ...Array(6).fill('white'),
  ...Array(4).fill('rose'),  ...Array(3).fill('sparkling'), ...Array(2).fill('fortified'),
];
const EMPTY = new Set(['0,0,0','4,2,0','2,1,0','1,2,1','3,0,1','0,1,1','4,1,1','2,2,1']);

// ================================================================
// FLES BOUWEN
// ================================================================
function makeBottle(wtype) {
  const w = WINE[wtype], bg = GEO[w.shape];
  const { h, nR, bR } = bg;
  const grp = new THREE.Group();

  // Glaslichaam
  const body = new THREE.Mesh(bg.geo, makeGlass(w.glass));
  body.castShadow = true; grp.add(body);

  // Dop
  const cpH = w.shape==='champagne' ? 0.035 : 0.024;
  const cpR = nR * 1.14;
  const cap = new THREE.Mesh(
    new THREE.CylinderGeometry(cpR, cpR, cpH, 36), makeCap(w.cap, w.capM));
  cap.position.y = h/2 - cpH*0.5; cap.castShadow = true; grp.add(cap);

  // Foliehuls (mousserende wijn)
  if (w.foil) {
    const fH=cpH*1.45, fR=cpR*1.25;
    const fMat = makeCap(w.foil, 0.90); fMat.roughness = 0.16;
    const foil = new THREE.Mesh(new THREE.CylinderGeometry(fR,fR,fH,36), fMat);
    foil.position.y = h/2 - fH*0.52; foil.castShadow = true; grp.add(foil);
  }

  // Etiket
  const lH = w.shape==='champagne' ? 0.062 : 0.068;
  const lbl = new THREE.Mesh(
    new THREE.CylinderGeometry(bR*1.007, bR*1.007, lH, 64, 1, true), LABEL_MAT);
  lbl.position.y = w.shape==='champagne' ? -h*0.07 : -h*0.03;
  grp.add(lbl);

  return grp;
}

// ================================================================
// FLESSEN PLAATSEN
// ================================================================
function placeBottles() {
  const grp = new THREE.Group();
  const all = [];
  for (let iz=0; iz<NZ; iz++)
    for (let iy=0; iy<NY; iy++)
      for (let ix=0; ix<NX; ix++)
        all.push([ix,iy,iz]);
  let ti = 0;
  for (const [ix,iy,iz] of all) {
    if (EMPTY.has(`${ix},${iy},${iz}`)) continue;
    const wtype  = SEQ[ti++ % SEQ.length];
    const bottle = makeBottle(wtype);
    const pos    = slotPt(ix, iy, iz);
    // Deterministisch micro-ruis – zelfde formule als Blender
    bottle.position.set(
      pos.x + ((ix*17+iy*7 +iz*11)%5-2)*0.0012,
      pos.y + ((ix*23+iy*3 +iz*29)%5-2)*0.0008,
      pos.z + ((ix*13+iy*19+iz*5 )%5-2)*0.0012
    );
    // Rx(-π/2) → hals naar -Z; Ry(π) voor oneven iy-rijen → hals naar +Z
    bottle.rotation.set(-Math.PI/2, (iy%2===1) ? Math.PI : 0, 0);
    grp.add(bottle);
  }
  return grp;
}

// ── Grondvlak ─────────────────────────────────────────────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(10,10),
  new THREE.MeshStandardMaterial({ color:0xf0f0f0, roughness:0.90 })
);
ground.rotation.x = -Math.PI/2; ground.position.y = -0.21;
ground.receiveShadow = true; scene.add(ground);

// ── Scene samenstellen ────────────────────────────────────────────
const rack = buildRack();    rack.position.y    = 0.06; scene.add(rack);
const bottles = placeBottles(); bottles.position.y = 0.06; scene.add(bottles);

// ── Laadscherm weg, UI zichtbaar ─────────────────────────────────
document.getElementById('loading').style.display = 'none';
document.getElementById('ui').style.display      = 'flex';

// ── Responsive ───────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ================================================================
// EIGEN ORBIT-CONTROLS (geen extern bestand nodig)
// ================================================================
let drag=false, lx=0, ly=0;
const tgt = CAM_TARGET.clone();
let camDist = camera.position.distanceTo(tgt);
let theta   = Math.atan2(camera.position.x - tgt.x, camera.position.z - tgt.z);
let phi     = Math.asin((camera.position.y - tgt.y) / camDist);

function applyCam() {
  camera.position.set(
    tgt.x + camDist * Math.cos(phi) * Math.sin(theta),
    tgt.y + camDist * Math.sin(phi),
    tgt.z + camDist * Math.cos(phi) * Math.cos(theta)
  );
  camera.lookAt(tgt);
}

const cv = renderer.domElement;
cv.addEventListener('mousedown',  e => { drag=true; lx=e.clientX; ly=e.clientY; });
cv.addEventListener('mouseup',    () => { drag=false; });
cv.addEventListener('mouseleave', () => { drag=false; });
cv.addEventListener('mousemove',  e => {
  if (!drag) return;
  theta -= (e.clientX-lx)*0.006;
  phi    = Math.max(-0.05, Math.min(Math.PI/2-0.05, phi-(e.clientY-ly)*0.005));
  lx=e.clientX; ly=e.clientY;
  applyCam(); renderer.render(scene, camera);
});
cv.addEventListener('wheel', e => {
  e.preventDefault();
  camDist = Math.max(0.35, Math.min(5.5, camDist + e.deltaY*0.003));
  applyCam(); renderer.render(scene, camera);
}, { passive: false });

// Touch
let tLx=0, tLy=0;
cv.addEventListener('touchstart', e => { drag=true; tLx=e.touches[0].clientX; tLy=e.touches[0].clientY; });
cv.addEventListener('touchend',   () => { drag=false; });
cv.addEventListener('touchmove',  e => {
  if (!drag) return;
  theta -= (e.touches[0].clientX-tLx)*0.006;
  phi    = Math.max(-0.05, Math.min(Math.PI/2-0.05, phi-(e.touches[0].clientY-tLy)*0.005));
  tLx=e.touches[0].clientX; tLy=e.touches[0].clientY;
  applyCam(); renderer.render(scene, camera);
}, { passive:true });

// ── Animatielus ──────────────────────────────────────────────────
(function loop() { requestAnimationFrame(loop); renderer.render(scene, camera); })();

// ── PNG opslaan ──────────────────────────────────────────────────
document.getElementById('save-btn').addEventListener('click', () => {
  renderer.render(scene, camera);
  Object.assign(document.createElement('a'),
    { download:'vinage_wijnrek.png', href: renderer.domElement.toDataURL('image/png') }
  ).click();
});

} catch(e) {
  document.getElementById('load-err').textContent = 'Opbouwfout: ' + e.message;
}
} // end build()
</script>
</body>
</html>
