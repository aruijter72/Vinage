<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Vinage – 3D Wijnrek</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#f5f0eb; overflow:hidden;
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
    canvas { display:block; cursor:grab; }
    canvas:active { cursor:grabbing; }
    #loading {
      position:fixed; inset:0; background:#f5f0eb; z-index:99;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;
    }
    #loading p { font-size:12px; color:#8a6040; letter-spacing:3px; text-transform:uppercase; }
    #load-err  { color:#c04020; font-size:11px; max-width:520px; text-align:center; }
    #title {
      position:fixed; top:18px; left:0; right:0; text-align:center;
      color:#5c2a10; font-size:13px; letter-spacing:5px;
      text-transform:uppercase; font-weight:400; pointer-events:none;
    }
    #ui {
      position:fixed; bottom:20px; left:0; right:0; display:none;
      justify-content:center; align-items:center; gap:14px;
    }
    button {
      padding:9px 26px; background:#5c1a10; color:#f5e8de;
      border:none; border-radius:22px; cursor:pointer;
      font-size:12px; letter-spacing:1.5px; text-transform:uppercase;
      box-shadow:0 3px 14px rgba(0,0,0,0.18);
    }
    button:hover { background:#7c2518; }
    #hint {
      padding:7px 16px; background:rgba(0,0,0,0.06);
      border:1px solid rgba(0,0,0,0.10); border-radius:14px;
      font-size:11px; color:#7a5030; letter-spacing:1px;
    }
  </style>
</head>
<body>
<div id="loading"><p>Laden…</p><span id="load-err"></span></div>
<div id="title">Vinage &mdash; Wijnkelder</div>
<div id="ui">
  <button id="save-btn">PNG Opslaan</button>
  <div id="hint">Sleep · Scroll om te zoomen</div>
</div>

<script src="./three.min.js"></script>
<script>
window.onerror=function(msg,_,line){document.getElementById('load-err').textContent='Fout r'+line+': '+msg;};
if(typeof THREE==='undefined'){
  document.getElementById('load-err').textContent='three.min.js niet gevonden.';
}else{build();}

function build(){try{

// ================================================================
// VINAGE – 3D Wijnrek  |  Three.js r128
// Flessen als liggende PlaneGeometry (portrait texture, flat in slot)
// NX=5 kolommen  NY=2 diepte (structureel)  NZ=5 rijen
// ================================================================

const renderer=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.05;
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0xf5f0eb);

// Verlichting – warm, zacht voor lichte achtergrond
scene.add(new THREE.AmbientLight(0xfff5ee,1.1));
const key=new THREE.DirectionalLight(0xfff8f0,2.0);
key.position.set(3,5,4); key.castShadow=true;
key.shadow.mapSize.set(2048,2048);
key.shadow.camera.near=0.1; key.shadow.camera.far=15;
key.shadow.camera.left=-1.5; key.shadow.camera.right=1.5;
key.shadow.camera.top=2; key.shadow.camera.bottom=-2;
key.shadow.bias=-0.0005; scene.add(key);
const fill=new THREE.DirectionalLight(0xe8eeff,0.6);
fill.position.set(-3,2,1); scene.add(fill);
const top=new THREE.DirectionalLight(0xffffff,0.4);
top.position.set(0,6,0); scene.add(top);

// ── REKPARAMETERS ─────────────────────────────────────────────────
const NX=5, NY=2, NZ=5, CELL=0.12;
const ROD_R=0.0050, NODE_R=0.0095;

// bPt: knooppunt in 3D ruimte
function bPt(ix,iy,iz){
  return new THREE.Vector3((ix-NX/2)*CELL,(iz-NZ/2)*CELL,-((iy-NY/2)*CELL));
}

// Rekmateriaal: donker staal met goudachtige glans
const rackMat=new THREE.MeshStandardMaterial({
  color:0x1e1610, metalness:0.92, roughness:0.22
});

// ── Rekstructuur ──────────────────────────────────────────────────
function buildRack(){
  const grp=new THREE.Group();
  const sph=new THREE.SphereGeometry(NODE_R,14,10);
  function addRod(p1,p2){
    const dir=new THREE.Vector3().subVectors(p2,p1);
    const len=dir.length(); if(len<1e-6)return;
    const mid=new THREE.Vector3().addVectors(p1,p2).multiplyScalar(.5);
    const m=new THREE.Mesh(new THREE.CylinderGeometry(ROD_R,ROD_R,len,10),rackMat);
    m.position.copy(mid);
    m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir.normalize());
    m.castShadow=true; m.receiveShadow=true; grp.add(m);
  }
  for(let ix=0;ix<=NX;ix++) for(let iy=0;iy<=NY;iy++) for(let iz=0;iz<=NZ;iz++){
    const p=bPt(ix,iy,iz);
    const s=new THREE.Mesh(sph,rackMat); s.position.copy(p); s.castShadow=true; grp.add(s);
    if(ix<NX)addRod(p,bPt(ix+1,iy,iz));
    if(iy<NY)addRod(p,bPt(ix,iy+1,iz));
    if(iz<NZ)addRod(p,bPt(ix,iy,iz+1));
  }
  return grp;
}

const BOTTLE_ASPECT={red:0.262,white:0.2705,rose:0.2706,sparkling:0.2852,fortified:0.2669};


// ── Texturen laden ─────────────────────────────────────────────────
const textures={};
let loaded=0;
const total=Object.keys(BOTTLE_IMG).length;
function onLoad(){loaded++;if(loaded===total)finishBuild();}

for(const[wtype,src]of Object.entries(BOTTLE_IMG)){
  const img=new Image();
  img.onload=function(){
    const t=new THREE.Texture(img);
    t.encoding=THREE.sRGBEncoding;
    t.needsUpdate=true;
    textures[wtype]=t;
    onLoad();
  };
  img.src=src;
}

// ── Wijnvolgorde: 25 slots (5×5), 3 leeg = 22 flessen ─────────────
const SEQ=[
  ...Array(7).fill('red'), ...Array(6).fill('white'),
  ...Array(4).fill('rose'),...Array(3).fill('sparkling'),...Array(2).fill('fortified')
];
const EMPTY=new Set(['0,4','4,3','2,2']);

const rack=buildRack();
scene.add(rack);

// Grondvlak voor schaduwen
const gnd=new THREE.Mesh(
  new THREE.PlaneGeometry(10,10),
  new THREE.MeshStandardMaterial({color:0xede8e2,roughness:0.95,metalness:0})
);
gnd.rotation.x=-Math.PI/2;
gnd.position.y=(-NZ/2)*CELL-0.01;
gnd.receiveShadow=true;
scene.add(gnd);

function finishBuild(){
  let ti=0;
  for(let iz=0;iz<NZ;iz++){
    for(let ix=0;ix<NX;ix++){
      if(EMPTY.has(ix+','+iz))continue;
      const wtype=SEQ[ti++%SEQ.length];
      const asp=BOTTLE_ASPECT[wtype];   // breedte/hoogte van portret-afbeelding
      // Fles liggend: lang-as gaat de diepte IN (Z-richting)
      // PlaneGeometry(breedte, hoogte) → na Rx(-90°): breedte=X, hoogte=Z
      const diam=CELL*0.78;             // breedte fles (past in vakje X)
      const len=diam/asp;               // lengte fles (proportioneel aan portret)
      const geo=new THREE.PlaneGeometry(diam,len);
      const mat=new THREE.MeshBasicMaterial({
        map:textures[wtype],
        transparent:true, alphaTest:0.04,
        side:THREE.DoubleSide,
        depthWrite:false,
      });
      const mesh=new THREE.Mesh(geo,mat);
      // Rx(-90°): vlak ligt horizontaal (etiket omhoog)
      mesh.rotation.x=-Math.PI/2;
      // Positie: midden van kolom ix, hoogte-rij iz, midden over beide dieptevakjes
      mesh.position.set(
        ((ix+0.5)-NX/2)*CELL,
        ((iz+0.5)-NZ/2)*CELL,
        0   // gecentreerd in de 2-slot diepte
      );
      mesh.renderOrder=1;
      scene.add(mesh);
    }
  }
  document.getElementById('loading').style.display='none';
  document.getElementById('ui').style.display='flex';
}

// ── Camera ────────────────────────────────────────────────────────
const CAM_TARGET=new THREE.Vector3(0,0,0);
const camera=new THREE.PerspectiveCamera(38,window.innerWidth/window.innerHeight,0.001,30);
camera.position.set(1.2,1.0,1.7);
camera.lookAt(CAM_TARGET);

let dist=camera.position.distanceTo(CAM_TARGET);
let theta=Math.atan2(camera.position.x-CAM_TARGET.x,camera.position.z-CAM_TARGET.z);
let phi=Math.asin(Math.max(-.99,Math.min(.99,(camera.position.y-CAM_TARGET.y)/dist)));

function applyCam(){
  camera.position.set(
    CAM_TARGET.x+dist*Math.cos(phi)*Math.sin(theta),
    CAM_TARGET.y+dist*Math.sin(phi),
    CAM_TARGET.z+dist*Math.cos(phi)*Math.cos(theta)
  ); camera.lookAt(CAM_TARGET);
}

let drag=false,lx=0,ly=0;
const cv=renderer.domElement;
cv.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;});
cv.addEventListener('mouseup',()=>drag=false);
cv.addEventListener('mouseleave',()=>drag=false);
cv.addEventListener('mousemove',e=>{
  if(!drag)return;
  theta-=(e.clientX-lx)*.006;
  phi=Math.max(.10,Math.min(Math.PI/2-.05,phi-(e.clientY-ly)*.005));
  lx=e.clientX;ly=e.clientY; applyCam();
});
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  dist=Math.max(.5,Math.min(6,dist+e.deltaY*.003));
  applyCam();
},{passive:false});
cv.addEventListener('touchstart',e=>{drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;},{passive:true});
cv.addEventListener('touchend',()=>drag=false);
cv.addEventListener('touchmove',e=>{
  if(!drag)return;
  theta-=(e.touches[0].clientX-lx)*.006;
  phi=Math.max(.10,Math.min(Math.PI/2-.05,phi-(e.touches[0].clientY-ly)*.005));
  lx=e.touches[0].clientX;ly=e.touches[0].clientY; applyCam();
},{passive:true});

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

(function loop(){requestAnimationFrame(loop);renderer.render(scene,camera);})();

document.getElementById('save-btn').addEventListener('click',()=>{
  renderer.render(scene,camera);
  Object.assign(document.createElement('a'),
    {download:'vinage_wijnrek.png',href:renderer.domElement.toDataURL('image/png')}).click();
});

}catch(e){document.getElementById('load-err').textContent='Opbouwfout: '+e.message;console.error(e);}}
</script>
