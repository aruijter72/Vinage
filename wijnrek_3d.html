<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Vinage – 3D Wijnrek</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d0806; overflow:hidden;
           font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
    canvas { display:block; cursor:grab; }
    canvas:active { cursor:grabbing; }
    #loading {
      position:fixed; inset:0; background:#0d0806; z-index:99;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;
    }
    #loading p { font-size:12px; color:#b08060; letter-spacing:3px; text-transform:uppercase; }
    #load-err  { color:#c06040; font-size:11px; max-width:520px; text-align:center; }
    #title {
      position:fixed; top:18px; left:0; right:0; text-align:center;
      color:#d4a87a; font-size:13px; letter-spacing:5px;
      text-transform:uppercase; font-weight:300; pointer-events:none;
    }
    #ui {
      position:fixed; bottom:20px; left:0; right:0; display:none;
      justify-content:center; align-items:center; gap:14px;
    }
    button {
      padding:9px 26px; background:#5c1a10; color:#f5e8de;
      border:none; border-radius:22px; cursor:pointer;
      font-size:12px; letter-spacing:1.5px; text-transform:uppercase;
      box-shadow:0 3px 14px rgba(0,0,0,0.5);
    }
    button:hover { background:#7c2518; }
    #hint {
      padding:7px 16px; background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.12); border-radius:14px;
      font-size:11px; color:#c0a080; letter-spacing:1px;
    }
  </style>
</head>
<body>
<div id="loading"><p>Laden…</p><span id="load-err"></span></div>
<div id="title">Vinage &mdash; Wijnkelder</div>
<div id="ui">
  <button id="save-btn">PNG Opslaan</button>
  <div id="hint">Sleep · Scroll om te zoomen</div>
</div>

<script src="./three.min.js"></script>
<script>
window.onerror=function(msg,_,line){document.getElementById('load-err').textContent='Fout r'+line+': '+msg;};
if(typeof THREE==='undefined'){
  document.getElementById('load-err').textContent='three.min.js niet gevonden.';
}else{build();}

function build(){try{

// ================================================================
// VINAGE – 3D Wijnrek met echte flesafbeeldingen
// Three.js r128 | Sprite-based flessen | NX=5 NY=2 NZ=5
// ================================================================

const renderer=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.15;
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0d0806);
scene.fog=new THREE.FogExp2(0x0d0806,0.4);

// Verlichting
scene.add(new THREE.AmbientLight(0xffeedd,0.9));
const key=new THREE.DirectionalLight(0xfff8f0,3.5);
key.position.set(2,3,3); key.castShadow=true;
key.shadow.mapSize.set(2048,2048);
key.shadow.camera.near=0.1; key.shadow.camera.far=12;
key.shadow.camera.left=-1.5; key.shadow.camera.right=1.5;
key.shadow.camera.top=1.5; key.shadow.camera.bottom=-1.5;
key.shadow.bias=-0.001; scene.add(key);
const fill=new THREE.DirectionalLight(0xddeeff,0.7);
fill.position.set(-2,1.5,1); scene.add(fill);

// ── REKPARAMETERS ─────────────────────────────────────────────────
const NX=5, NY=2, NZ=5, CELL=0.12;
const ROD_R=0.0055, NODE_R=0.0100;

function bPt(ix,iy,iz){
  return new THREE.Vector3((ix-NX/2)*CELL,(iz-NZ/2)*CELL,-((iy-NY/2)*CELL));
}

const rackMat=new THREE.MeshStandardMaterial({
  color:0x3a2510, metalness:0.80, roughness:0.35
});

function buildRack(){
  const grp=new THREE.Group();
  const sph=new THREE.SphereGeometry(NODE_R,12,10);
  function addRod(p1,p2){
    const dir=new THREE.Vector3().subVectors(p2,p1);
    const len=dir.length(); if(len<1e-6)return;
    const mid=new THREE.Vector3().addVectors(p1,p2).multiplyScalar(.5);
    const m=new THREE.Mesh(new THREE.CylinderGeometry(ROD_R,ROD_R,len,10),rackMat);
    m.position.copy(mid);
    m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir.normalize());
    m.castShadow=true; m.receiveShadow=true; grp.add(m);
  }
  for(let ix=0;ix<=NX;ix++) for(let iy=0;iy<=NY;iy++) for(let iz=0;iz<=NZ;iz++){
    const p=bPt(ix,iy,iz);
    const s=new THREE.Mesh(sph,rackMat); s.position.copy(p); s.castShadow=true; grp.add(s);
    if(ix<NX)addRod(p,bPt(ix+1,iy,iz));
    if(iy<NY)addRod(p,bPt(ix,iy+1,iz));
    if(iz<NZ)addRod(p,bPt(ix,iy,iz+1));
  }
  return grp;
}

// Beeldverhouding per flestype (breedte/hoogte van LIGGENDE fles)
const BOTTLE_ASPECT={
  red:3.82, white:3.70, rose:3.70, sparkling:3.51, fortified:3.75
};

// ── Texturen laden ────────────────────────────────────────────────
const textures={};
let loaded=0;
const total=Object.keys(BOTTLE_IMG).length;
function onLoad(){loaded++;if(loaded===total)finishBuild();}

for(const[wtype,src]of Object.entries(BOTTLE_IMG)){
  const img=new Image();
  img.onload=function(){
    const t=new THREE.Texture(img);
    t.encoding=THREE.sRGBEncoding;
    t.needsUpdate=true;
    textures[wtype]=t;
    onLoad();
  };
  img.src=src;
}

// ── Wijnvolgorde ──────────────────────────────────────────────────
// 5×5=25 slots, 3 leeg = 22 flessen
const SEQ=[
  ...Array(7).fill('red'), ...Array(6).fill('white'),
  ...Array(4).fill('rose'),...Array(3).fill('sparkling'),...Array(2).fill('fortified')
];
const EMPTY=new Set(['0,4','4,3','2,2']);

// ── Rek bouwen ─────────────────────────────────────────────────────
const rack=buildRack();
rack.position.y=0;
scene.add(rack);

// Achterwand
const wallMat=new THREE.MeshStandardMaterial({color:0x120a04,roughness:0.95,metalness:0});
const wall=new THREE.Mesh(
  new THREE.PlaneGeometry(NX*CELL+0.22,NZ*CELL+0.22), wallMat);
wall.rotation.y=Math.PI;
wall.position.set(0,0, (NY/2)*CELL+0.004);
scene.add(wall);

function finishBuild(){
  let ti=0;
  for(let iz=0;iz<NZ;iz++){
    for(let ix=0;ix<NX;ix++){
      if(EMPTY.has(ix+','+iz))continue;
      const wtype=SEQ[ti++%SEQ.length];
      const mat=new THREE.SpriteMaterial({
        map:textures[wtype], transparent:true, alphaTest:0.04,
        sizeAttenuation:true,
        depthWrite:false,
      });
      const sprite=new THREE.Sprite(mat);
      const sh=CELL*0.87;
      const sw=sh*BOTTLE_ASPECT[wtype];
      sprite.scale.set(sw,sh,1);
      sprite.position.set(
        ((ix+0.5)-NX/2)*CELL,
        ((iz+0.5)-NZ/2)*CELL,
        0
      );
      scene.add(sprite);
    }
  }
  document.getElementById('loading').style.display='none';
  document.getElementById('ui').style.display='flex';
}

// ── Camera ────────────────────────────────────────────────────────
const CAM_TARGET=new THREE.Vector3(0,0,0);
const camera=new THREE.PerspectiveCamera(36,window.innerWidth/window.innerHeight,0.001,30);
camera.position.set(1.3,0.7,1.8);
camera.lookAt(CAM_TARGET);

let dist=camera.position.distanceTo(CAM_TARGET);
let theta=Math.atan2(camera.position.x-CAM_TARGET.x,camera.position.z-CAM_TARGET.z);
let phi=Math.asin(Math.max(-.99,Math.min(.99,(camera.position.y-CAM_TARGET.y)/dist)));
const THETA_MIN=-1.0, THETA_MAX=1.0;

function applyCam(){
  camera.position.set(
    CAM_TARGET.x+dist*Math.cos(phi)*Math.sin(theta),
    CAM_TARGET.y+dist*Math.sin(phi),
    CAM_TARGET.z+dist*Math.cos(phi)*Math.cos(theta)
  ); camera.lookAt(CAM_TARGET);
}

let drag=false,lx=0,ly=0;
const cv=renderer.domElement;
cv.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;});
cv.addEventListener('mouseup',()=>drag=false);
cv.addEventListener('mouseleave',()=>drag=false);
cv.addEventListener('mousemove',e=>{
  if(!drag)return;
  theta=Math.max(THETA_MIN,Math.min(THETA_MAX,theta-(e.clientX-lx)*.006));
  phi=Math.max(.04,Math.min(Math.PI/2-.04,phi-(e.clientY-ly)*.005));
  lx=e.clientX;ly=e.clientY; applyCam();
});
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  dist=Math.max(.4,Math.min(5,dist+e.deltaY*.003));
  applyCam();
},{passive:false});
cv.addEventListener('touchstart',e=>{drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;},{passive:true});
cv.addEventListener('touchend',()=>drag=false);
cv.addEventListener('touchmove',e=>{
  if(!drag)return;
  theta=Math.max(THETA_MIN,Math.min(THETA_MAX,theta-(e.touches[0].clientX-lx)*.006));
  phi=Math.max(.04,Math.min(Math.PI/2-.04,phi-(e.touches[0].clientY-ly)*.005));
  lx=e.touches[0].clientX;ly=e.touches[0].clientY; applyCam();
},{passive:true});

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

(function loop(){requestAnimationFrame(loop);renderer.render(scene,camera);})();

document.getElementById('save-btn').addEventListener('click',()=>{
  renderer.render(scene,camera);
  Object.assign(document.createElement('a'),
    {download:'vinage_wijnrek.png',href:renderer.domElement.toDataURL('image/png')}).click();
});

}catch(e){document.getElementById('load-err').textContent='Opbouwfout: '+e.message;console.error(e);}}
</script>
</body>
</html>
