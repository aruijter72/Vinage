<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Vinage">
  <meta name="theme-color" content="#6B2737">
  <meta name="description" content="Vinage — Your personal wine cellar. Scan bottles, manage your rack, match wines to meals.">

  <title>Vinage 🍷</title>

  <!-- Favicon via emoji -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍷</text></svg>">

  <!-- PWA Manifest (inline) -->
  <link rel="manifest" href="manifest.json">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Rendered by app.js -->
    <div style="display:flex;align-items:center;justify-content:center;min-height:100dvh;flex-direction:column;gap:16px;color:#6B2737">
      <div style="font-size:3rem">🍷</div>
      <div style="font-size:1.2rem;font-weight:700">Vinage</div>
      <div style="font-size:.85rem;opacity:.6">Loading…</div>
    </div>
  </div>

  <!-- Load order matters: i18n → db → api → app -->
  <script src="js/i18n.js"></script>
  <script src="js/db.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
